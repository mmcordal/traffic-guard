services:
  postgres:
    image: postgres:16
    container_name: trafficguard_postgres
    environment:
      POSTGRES_DB: trafficguard_db
      POSTGRES_USER: trafficguard
      POSTGRES_PASSWORD: trafficguard123
    ports:
      - "5440:5432"
    volumes:
      - trafficguard_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: trafficguard_redis
    ports:
      - "6380:6379"

  grafana:
    image: grafana/grafana:latest
    container_name: trafficguard_grafana
    ports:
      - "3000:3000"
    volumes:
      - trafficguard_grafana_data:/var/lib/grafana
    depends_on:
      - postgres

volumes:
  trafficguard_pg_data:
  trafficguard_grafana_data: